version = 1
SPDX-PackageName = "harbour-meteoswiss"
SPDX-PackageSupplier = "Mirian Margiani <mixosaurus+ichthyo@pm.me>"
SPDX-PackageDownloadLocation = "https://codeberg.org/ichthyosaurus/harbour-meteoswiss"

[[annotations]]
path = ["translations/**", "TRANSLATORS.json"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2020-2024 harbour-meteoswiss translations contributors"
SPDX-License-Identifier = "GPL-3.0-or-later"

[[annotations]]
path = "rpm/harbour-**.spec"
precedence = "aggregate"
SPDX-FileCopyrightText = "Mirian Margiani"
SPDX-License-Identifier = "GPL-3.0-or-later"
SPDX-FileComment = "This file is generated from [this file's name].yaml and shares copyright with it."

[[annotations]]
path = ["icons/**", "qml/images/**", "dist/harbour-**.png"]
precedence = "aggregate"
SPDX-FileCopyrightText = "Mirian Margiani"
SPDX-License-Identifier = "CC-BY-SA-4.0"
SPDX-FileComment = "These files are generated from the sources at icons-src/*."

[[annotations]]
path = "icon-src/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "Mirian Margiani"
SPDX-License-Identifier = "CC-BY-SA-4.0"
SPDX-FileComment = "These files contain proper Dublin Core licensing metadata."

[[annotations]]
path = "qml/weather-icons/**.svg"
precedence = "aggregate"
SPDX-FileCopyrightText = "Copyright, Federal Office of Meteorology and Climatology MeteoSwiss."
SPDX-License-Identifier = "LicenseRef-Official"
SPDX-FileComment = "These files are included as a cache to reduce load on official servers."

[[annotations]]
path = ["qml/js/strings.js", "qml/weather-icons/descriptions", "raw/strings/strings-**.js"]
precedence = "aggregate"
SPDX-FileCopyrightText = "Copyright, Federal Office of Meteorology and Climatology MeteoSwiss."
SPDX-License-Identifier = "LicenseRef-Official"
SPDX-FileComment = "These files contain weather descriptions, directly taken from the official website, and converted from data from the website."

[[annotations]]
path = "qml/db/locations.db"
precedence = "aggregate"
SPDX-FileCopyrightText = "Copyright, Federal Office of Meteorology and Climatology MeteoSwiss."
SPDX-License-Identifier = "LicenseRef-Official"
SPDX-FileComment = "This file is generated by the build_locations_db.py script from the official app's metadata database."
